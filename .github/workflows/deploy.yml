name: Deploy Rota Livre

on:
  push:
    branches: [ main ] # Executa sempre que você der push na main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      - name: Enviar via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ssh-rotalivre.alwaysdata.net
          username: rotalivre
          key: ${{ secrets.SSH_PRIVATE_KEY }} # Usa a chave que você colou no GitHub
          source: "./publish/*"
          target: "api/publish" 
          strip_components: 1

      - name: Restart Site
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ssh-rotalivre.alwaysdata.net
          username: rotalivre
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: alw-restart-site rotalivre